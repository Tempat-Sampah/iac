---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
name: ollama
services:
  ollama:
    image: mirror.gcr.io/ollama/ollama:0.32.3
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    restart: unless-stopped
    ports:
      - 3000:8080
    volumes:
      - open-webui:/app/backend/data
    environment:
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_PROVIDER_NAME=Authentik
      - OPENID_PROVIDER_URL=https://auth.mafyuh.io/application/o/open-webui/.well-known/openid-configuration
      - OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET
      - OAUTH_SCOPES=openid email profile
      - OPENID_REDIRECT_URI=https://chat.mafyuh.io/oauth/oidc/callback
      - ENABLE_LOGIN_FORM=false
      - DATABASE_URL=$DATABASE_URL
    extra_hosts:
      - host.docker.internal:host-gateway

  open-terminal:
    container_name: open-terminal
    image: ghcr.io/open-webui/open-terminal:0.11.34
    restart: unless-stopped
    ports:
      - 3001:8000
    volumes:
      - open-terminal:/home
    environment:
      - OPEN_TERMINAL_API_KEY=$OPEN_TERMINAL_API_KEY
      - OPEN_TERMINAL_MULTI_USER=true

  litellm:
    image: ghcr.io/berriai/litellm:v1.93.0
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://llmproxy:${LITELLM_DB_PASSWORD}@10.0.0.210:5432/litellm
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: $LITELLM_MASTER_KEY
      LITELLM_SALT_KEY: $LITELLM_SALT_KEY
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  searxng:
    image: searxng/searxng@sha256:854f239d5c181db9c4282cd0ffc1737a61232dd6ad0ea964028b96df17d7758a
    container_name: searxng
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/searxng:/etc/searxng
    restart: unless-stopped
    ports:
      - "8081:8080"

volumes:
  open-terminal:
  open-webui:
