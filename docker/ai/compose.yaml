---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
name: ollama
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    restart: unless-stopped
    ports:
      - 3000:8080
    volumes:
      - open-webui:/app/backend/data
    environment:
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_PROVIDER_NAME=Authentik
      - OPENID_PROVIDER_URL=https://auth.mafyuh.io/application/o/open-webui/.well-known/openid-configuration
      - OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET
      - OAUTH_SCOPES=openid email profile
      - OPENID_REDIRECT_URI=https://chat.mafyuh.io/oauth/oidc/callback
      - ENABLE_LOGIN_FORM=false
      - DATABASE_URL=$DATABASE_URL
    extra_hosts:
      - host.docker.internal:host-gateway
  searxng:
    image: searxng/searxng@sha256:f433294b46a93564993c4371005341e013d94aa8ea4662d8ee521cd2cccb08e8
    container_name: searxng
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/searxng:/etc/searxng
    restart: unless-stopped
    ports:
      - "8081:8080"

  open-terminal:
    container_name: open-terminal
    image: ghcr.io/open-webui/open-terminal:0.11.34
    restart: unless-stopped
    ports:
      - 3001:8000
    volumes:
      - open-terminal:/home
    environment:
      - OPEN_TERMINAL_API_KEY=$OPEN_TERMINAL_API_KEY
      - OPEN_TERMINAL_MULTI_USER=true

volumes:
  open-terminal:
  open-webui: